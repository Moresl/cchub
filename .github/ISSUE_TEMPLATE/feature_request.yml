name: 功能建议 / Feature Request
description: 提出新功能或改进建议 / Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！好的想法让 CCHub 变得更好。
        Thanks for your suggestion! Great ideas make CCHub better.

  - type: textarea
    id: problem
    attributes:
      label: 问题或痛点 / Problem or Pain Point
      placeholder: 描述你目前遇到的不便 / Describe what's frustrating or missing
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案 / Proposed Solution
      placeholder: 描述你希望的功能 / Describe the feature you'd like
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: 功能类别 / Category
      options:
        - MCP 服务器管理
        - 技能管理 (Skills)
        - 配置切换 (Config Profiles)
        - 钩子管理 (Hooks)
        - UI / 界面
        - 设置 / 偏好
        - 其他 (Other)
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 重要程度 / Importance
      options:
        - 很重要，影响日常使用 / Critical - blocks daily use
        - 比较重要，希望尽快有 / Important - would use often
        - 锦上添花 / Nice to have
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 / Alternatives Considered
      placeholder: 你目前是怎么绕过这个问题的？/ How do you work around this currently?

  - type: textarea
    id: context
    attributes:
      label: 补充信息 / Additional Context
      placeholder: 截图、参考链接等 / Screenshots, reference links, etc.
